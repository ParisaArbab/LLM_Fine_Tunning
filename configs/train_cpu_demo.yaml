model_name: sshleifer/tiny-gpt2
train_file: data/processed/train.jsonl
validation_file: data/processed/validation.jsonl
output_dir: outputs/tiny-demo-adapter

seed: 42
max_seq_length: 256
use_4bit: false

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - c_attn

num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 0.0002
weight_decay: 0.0
warmup_ratio: 0.0
lr_scheduler_type: linear
logging_steps: 1
eval_steps: 5
save_steps: 5
save_total_limit: 1
gradient_checkpointing: false
bf16: false
fp16: false
report_to: none
